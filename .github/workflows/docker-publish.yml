name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/broadcast-rental/ultritouch-monitor:latest
            ghcr.io/broadcast-rental/ultritouch-monitor:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Set GHCR package visibility to public
        continue-on-error: true
        run: |
          gh api --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/ultritouch-monitor/visibility" \
            -f visibility='public'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
