# Optional: pull pre-built image (package must be public or registry login in Portainer).
#   docker compose -f docker-compose.ghcr.yml up -d
services:
  ultritouch-monitor:
    image: ghcr.io/broadcast-rental/ultritouch-monitor:latest
    pull_policy: always
    network_mode: host
    volumes:
      - ${ULTRITOUCH_CONFIG:-./config.yaml}:/app/config.yaml:ro
      - ${ULTRITOUCH_DATA:-./data}:/app/data
    environment:
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
