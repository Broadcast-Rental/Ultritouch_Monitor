# Copy to config.yaml and adjust for your flypack.

snmp:
  community: public
  timeout: 0.5
  retries: 0

arista:
  host: 172.21.100.2
  port_start: 3
  port_end: 26
  # Populated by: python -m src.discover_arista --output arista_ports.yaml
  # ports:
  #   "3":
  #     if_index: 1003
  #     rx_sensor_index: 100006003
  #     label: Ethernet3

aruba:
  subnet_base: "172.21.100"
  host_start: 3
  host_end: 50
  uplink_ifindex: 26

ember:
  hosts:
    - 172.21.50.21
    - 172.21.50.22
  port: 9000
  sr2_name_match: "SR2"
  fiber_root: "997"
  state_file: data/ember_state.json

thresholds:
  orange_dbm: -18.0
  red_dbm: -25.0
  recent_error_seconds: 300

polling:
  interval_seconds: 15
  error_window_polls: 3

api:
  host: "0.0.0.0"
  port: 8080
