# Alias for docker-compose.yml (build on host).
services:
  ultritouch-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ${ULTRITOUCH_CONFIG:-./config.yaml}:/app/config.yaml:ro
      - ${ULTRITOUCH_DATA:-./data}:/app/data
    environment:
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
